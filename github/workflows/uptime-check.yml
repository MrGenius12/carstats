name: CarStats.ie Uptime Check

on:
  schedule:
    # Каждые 5 минут (реальный интервал GitHub Actions может немного плавать)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # позволяет запустить вручную из вкладки Actions

permissions:
  contents: write   # нужно, чтобы коммитить обновлённый status.json обратно в репозиторий

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run uptime check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://carstats.ie
        run: python uptime_monitor.py

      - name: Commit updated status file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || git commit -m "Update uptime status [skip ci]"
          git push
