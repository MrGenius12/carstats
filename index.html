<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f1419;
    color: #e8eaed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #2a2f38;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
  }

  .logo svg {
    display: block;
  }

  nav {
    display: flex;
    gap: 24px;
    font-size: 14px;
  }

  nav a {
    color: #8b949e;
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover {
    color: #ffffff;
  }

  .header-divider {
    width: 1px;
    height: 24px;
    background: #2a2f38;
    margin: 0 20px;
  }

  .header-tagline {
    flex: 1;
    color: #8b949e;
    font-size: 14px;
    font-weight: 500;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  .dashboard-wrapper {
    width: 100%;
    max-width: 1400px;
    background: #161b22;
    border: 1px solid #2a2f38;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .dashboard-tabs {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    padding: 14px 16px;
    background: #161b22;
    border-bottom: 1px solid #2a2f38;
  }

  .tab-btn {
    background: #1c222c;
    border: 1px solid #2a2f38;
    color: #8b949e;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }

  .tab-btn:hover {
    color: #c9d1d9;
    background: #242b36;
  }

  .tab-btn.active {
    color: #ffffff;
    background: #1d3a6e;
    border-color: #4f8cff;
  }

  .dashboard-frame {
    position: relative;
    width: 100%;
    height: 70vh;
    min-height: 420px;
    max-height: 720px;
    background: #0f1419;
  }

  .dashboard-frame iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #6e7681;
    font-size: 13px;
    border-top: 1px solid #2a2f38;
  }

  footer a {
    color: #6e7681;
  }

  @media (max-width: 640px) {
    header {
      padding: 14px 16px;
    }
    .header-divider {
      display: none;
    }
    .header-tagline {
      display: none;
    }
    nav {
      gap: 16px;
    }
    .dashboard-tabs {
      grid-template-columns: repeat(2, 1fr);
    }
    .tab-btn {
      font-size: 12px;
      padding: 9px 8px;
    }
    .dashboard-frame {
      height: 60vh;
      min-height: 380px;
      max-height: 600px;
    }
  }

  @media (max-width: 400px) {
    .logo svg {
      width: 130px;
      height: 34px;
    }
    nav {
      font-size: 13px;
      gap: 12px;
    }
  }  .cookie-banner {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #161b22;
    border-top: 1px solid #2a2f38;
    padding: 16px 24px;
    z-index: 1000;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
  }

  .cookie-banner p {
    color: #c9d1d9;
    font-size: 13px;
    margin: 0;
    max-width: 640px;
  }

  .cookie-banner a {
    color: #4f8cff;
  }

  .cookie-actions {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .cookie-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #2a2f38;
    transition: background 0.2s;
  }

  .cookie-btn-secondary {
    background: transparent;
    color: #8b949e;
  }

  .cookie-btn-secondary:hover {
    background: #1c222c;
  }

  .cookie-btn-primary {
    background: #4f8cff;
    color: #ffffff;
    border-color: #4f8cff;
  }

  .cookie-btn-primary:hover {
    background: #3d7ae8;
  }

  @media (max-width: 640px) {
    .cookie-banner {
      flex-direction: column;
      align-items: stretch;
    }
    .cookie-actions {
      justify-content: flex-end;
    }
  }
</style>

<div id="cookie-banner" class="cookie-banner">

  <div class="cookie-actions">
    <button id="cookie-decline" class="cookie-btn cookie-btn-secondary">Decline</button>
    <button id="cookie-accept" class="cookie-btn cookie-btn-primary">Accept</button>
  </div>
</div>

<script>
  (function() {
    const banner = document.getElementById('cookie-banner');
    const consent = localStorage.getItem('cookie_consent');

    if (!consent) {
      banner.style.display = 'flex';
    }

    document.getElementById('cookie-accept').addEventListener('click', function() {
      localStorage.setItem('cookie_consent', 'granted');
      gtag('consent', 'update', {
        'analytics_storage': 'granted'
      });
      banner.style.display = 'none';
    });

    document.getElementById('cookie-decline').addEventListener('click', function() {
      localStorage.setItem('cookie_consent', 'denied');
      banner.style.display = 'none';
    });
  })();
</script>

<script>
  const tabButtons = document.querySelectorAll('.tab-btn');
  const dashboardIframe = document.getElementById('dashboard-iframe');

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      dashboardIframe.src = btn.getAttribute('data-src');
    });
  });
</script>
